<h3>帮助中心</h3>
<p>欢迎使用用户管理系统帮助中心。</p>
<ul>
    <li><strong>登录</strong>：在登录页面输入用户名和密码即可登录系统。</li>
    <li><strong>注册</strong>：点击注册按钮，填写用户名、密码、邮箱和手机号完成注册。</li>
    <li><strong>搜索</strong>：在首页搜索框中输入用户名或邮箱关键词，可搜索系统中的用户。</li>
    <li><strong>上传头像</strong>：登录后点击"上传头像"，选择图片文件即可上传。</li>
    <li><strong>个人中心</strong>：登录后点击"个人中心"可查看个人信息和余额，支持充值操作。</li>
</ul>
<p>如有其他问题，请联系管理员。</p>
