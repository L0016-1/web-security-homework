{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Ping 网络诊断</h2>
    <form method="POST" action="/ping" class="recharge-form">
        <div class="form-group">
            <label for="ip">目标地址</label>
            <input type="text" id="ip" name="ip" placeholder="输入 IP 地址或域名" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Ping</button>
    </form>

    {% if ping_output is not none %}
        <h3>执行结果：</h3>
        <div class="ping-output">
<pre>{{ ping_output }}</pre>
        </div>
    {% endif %}
</div>
{% endblock %}
